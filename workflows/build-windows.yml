# Gera PrestacaoContasUnimed.exe no Windows (GitHub Actions)
# O .exe fica em Actions > [run] > Artifacts > PrestacaoContasUnimed-Windows

name: Build Windows EXE

on:
  push:
    branches: [main, master]
  workflow_dispatch:   # Run workflow manualmente em Actions

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar arquivos do projeto
        run: |
          if (!(Test-Path main.py)) { Write-Error "main.py nao encontrado na raiz. A raiz do repo deve conter main.py e prestacao_contas_unimed.spec." }
          if (!(Test-Path prestacao_contas_unimed.spec)) { Write-Error "prestacao_contas_unimed.spec nao encontrado." }
          Get-ChildItem -Name

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: pyinstaller --clean --noconfirm prestacao_contas_unimed.spec

      - name: Verificar se o EXE foi gerado
        run: |
          if (!(Test-Path dist/PrestacaoContasUnimed.exe)) {
            Get-ChildItem -Recurse dist -ErrorAction SilentlyContinue
            Write-Error "PrestacaoContasUnimed.exe nao foi gerado em dist/"
          }
          Get-ChildItem dist

      - name: Upload PrestacaoContasUnimed.exe
        uses: actions/upload-artifact@v4
        with:
          name: PrestacaoContasUnimed-Windows
          path: dist/PrestacaoContasUnimed.exe
